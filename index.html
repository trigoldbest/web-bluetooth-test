<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web 藍牙指令測試器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

    <div class="max-w-2xl mx-auto pt-12 px-4">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-2">Web 藍牙連線 & 自動指令</h1>
            <p class="text-slate-600">連線後將自動設定 10Hz 並開始繪製即時氣壓圖表</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
            <!-- 壓力顯示與即時圖表區 -->
            <div class="mb-6 bg-slate-50 p-5 rounded-xl border border-slate-200">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-4 gap-4">
                    <div>
                        <h3 class="text-sm font-bold text-slate-700 mb-1">即時氣壓 (BV.hPA)</h3>
                        <div class="text-3xl font-extrabold text-blue-600" id="pressureText">壓力 = -- hPA</div>
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-slate-500 mr-2">圖表顯示範圍:</label>
                        <select id="timeRangeSelect" class="text-sm p-1 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="10">10 秒</option>
                            <option value="20">20 秒</option>
                            <option value="30">30 秒</option>
                            <option value="60">60 秒</option>
                        </select>
                    </div>
                </div>
                <div class="w-full h-64">
                    <canvas id="pressureChart"></canvas>
                </div>
            </div>

            <div class="flex items-center justify-between mb-8 pb-6 border-b border-slate-100">
                <div>
                    <p class="text-sm font-medium text-slate-500 mb-1">目前狀態</p>
                    <span id="statusText" class="text-xl font-bold text-slate-700">尚未連線</span>
                </div>
                <div id="deviceNameContainer" class="hidden text-right">
                    <p class="text-sm font-medium text-slate-500 mb-1">已連接裝置</p>
                    <p id="deviceName" class="text-lg font-semibold text-blue-600">--</p>
                </div>
            </div>

            <div class="flex gap-4 mb-8">
                <button id="scanBtn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl transition">
                    搜尋並連線
                </button>
                <button id="disconnectBtn" class="hidden flex-1 bg-rose-50 text-rose-600 border border-rose-200 font-semibold py-3 px-6 rounded-xl transition">
                    中斷連線
                </button>
                <button id="powerOffBtn" class="hidden flex-1 bg-slate-800 hover:bg-slate-900 text-white font-semibold py-3 px-6 rounded-xl transition shadow-sm">
                    關機 (0x43)
                </button>
            </div>

            <!-- 接收資料顯示區 -->
            <div class="mb-8">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-sm font-medium text-slate-500">接收到的資料 (Hex / Text)</h3>
                    <button id="clearDataBtn" class="text-xs text-slate-400 hover:text-slate-600 transition">清除資料</button>
                </div>
                <div id="rxDataBox" class="bg-slate-50 rounded-xl p-4 h-32 overflow-y-auto font-mono text-sm text-slate-700 border border-slate-200 space-y-2">
                    <!-- 接收到的資料會顯示在這裡 -->
                </div>
            </div>

            <div class="bg-slate-900 rounded-xl p-4">
                <div id="logBox" class="h-48 overflow-y-auto font-mono text-sm text-green-400 space-y-1"></div>
            </div>
        </div>
    </div>

    <script>
        // 固定的 UUID 設定
        const SERVICE_UUID = '0000ae30-0000-1000-8000-00805f9b34fb';
        const WRITE_UUID = '0000ae01-0000-1000-8000-00805f9b34fb';
        const NOTIFY_UUID = '0000ae02-0000-1000-8000-00805f9b34fb';

        const scanBtn = document.getElementById('scanBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const powerOffBtn = document.getElementById('powerOffBtn');
        const statusText = document.getElementById('statusText');
        const deviceNameEl = document.getElementById('deviceName');
        const deviceNameContainer = document.getElementById('deviceNameContainer');
        const logBox = document.getElementById('logBox');
        const rxDataBox = document.getElementById('rxDataBox');
        const clearDataBtn = document.getElementById('clearDataBtn');
        
        // 圖表與氣壓顯示相關元素
        const pressureText = document.getElementById('pressureText');
        const timeRangeSelect = document.getElementById('timeRangeSelect');

        let bluetoothDevice = null;
        let chartInstance = null;
        let pressureDataPoints = []; // 存放 {x: timestamp, y: value} 供圖表使用

        // --- 初始化 Chart.js ---
        function initChart() {
            const ctx = document.getElementById('pressureChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [{
                        label: '氣壓 (hPA)',
                        data: pressureDataPoints,
                        borderColor: '#2563eb', // Tailwind blue-600
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false, // 關閉動畫以應付 10Hz 高頻率更新，提升效能
                    scales: {
                        x: {
                            type: 'linear',
                            display: false // 隱藏 X 軸數值，以相對時間滾動顯示
                        },
                        y: {
                            // 預設縮放範圍，會根據數據自動調整
                            suggestedMin: 1000,
                            suggestedMax: 1020
                        }
                    }
                }
            });
        }
        initChart();

        clearDataBtn.addEventListener('click', () => { rxDataBox.innerHTML = ''; });

        scanBtn.addEventListener('click', async () => {
            try {
                log(`正在請求裝置...`, 'info');
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [SERVICE_UUID] 
                });

                bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);
                connectToGattServer();
            } catch (error) {
                log(`錯誤: ${error.message}`, 'error');
            }
        });

        async function connectToGattServer() {
            try {
                statusText.textContent = '連線中...';
                log('連線至 GATT 伺服器...', 'info');
                const server = await bluetoothDevice.gatt.connect();
                
                log('連線成功！', 'success');
                updateUI(true, bluetoothDevice.name);

                // --- 1. 啟動接收資料監聽 ---
                await setupNotifications(server);

                // --- 2. 連線後立即發送 10Hz 頻率設定指令 ---
                const freqConfig = new Uint8Array([0x12, 0x05, 0xFF, 0x00, 0x04, 0x0A, 0x01, 0x03, 0x05, 0x12, 0x00]);
                log('正在設定裝置回傳頻率為 10Hz...', 'info');
                await sendByteArray(server, freqConfig);

                // --- 3. 設定 5 秒後自動傳送指令 0x29 ---
                log('已排程：5 秒後傳送指令 0x29...', 'info');
                setTimeout(async () => {
                    if (bluetoothDevice && bluetoothDevice.gatt.connected) {
                        await sendByteArray(server, new Uint8Array([0x29]));
                    }
                }, 5000);

            } catch (error) {
                log(`連線失敗: ${error.message}`, 'error');
                updateUI(false);
            }
        }

        async function setupNotifications(server) {
            try {
                const service = await server.getPrimaryService(SERVICE_UUID);
                const characteristic = await service.getCharacteristic(NOTIFY_UUID);
                
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', handleCharacteristicValueChanged);
                log('已成功開啟資料接收監聽！', 'success');
            } catch (error) {
                log(`開啟接收通知失敗: ${error.message}`, 'error');
            }
        }

        // ==========================================
        // 🚨 氣壓資料解析邏輯 (已依據 BLE解析.txt 實作) 🚨
        // ==========================================
        function parsePressureData(dataView) {
            // 檢查封包長度並確認開頭是否為 0x11
            if (dataView.byteLength < 7 || dataView.getUint8(0) !== 0x11) {
                return null; 
            }

            // 取出 ctl (数据订阅标识)
            let ctl = (dataView.getUint8(2) << 8) | dataView.getUint8(1);
            let L = 7;

            // 依據 ctl 判斷前面有哪些資料，並向後推移指標 L
            if ((ctl & 0x0001) !== 0) L += 6; // 加速度 (無重力)
            if ((ctl & 0x0002) !== 0) L += 6; // 加速度 (含重力)
            if ((ctl & 0x0004) !== 0) L += 6; // 角速度
            if ((ctl & 0x0008) !== 0) L += 6; // 磁場

            // 判斷是否包含 溫度、氣壓、高度 (0x0010)
            if ((ctl & 0x0010) !== 0) {
                // 確保封包長度足夠讀取 (Temp: 2 bytes, Pressure: 3 bytes)
                if (L + 5 > dataView.byteLength) return null;

                L += 2; // 跳過溫度資料

                // 讀取氣壓 (由3個 Byte 組成)
                let b0 = dataView.getUint8(L);
                let b1 = dataView.getUint8(L + 1);
                let b2 = dataView.getUint8(L + 2);
                let tmp32 = (b2 << 16) | (b1 << 8) | b0;
                
                // 若最高位(第24位)為1，代表負數，進行符號擴展補上 FF
                if ((tmp32 & 0x800000) !== 0) {
                    tmp32 = tmp32 | 0xff000000;
                }

                // 大多數這類感測器直接輸出的氣壓單位為 Pa，因此除以 100 轉換為 hPa (百帕)
                // (如果顯示的數值異常，例如小了 100 倍，請將此處改為 1.0)
                let scaleAirPressure = 1.0 / 100.0; 
                let hPaValue = tmp32 * scaleAirPressure;

                return hPaValue;
            }

            return null; // 若此封包不含氣壓資料
        }

        function handleCharacteristicValueChanged(event) {
            const value = event.target.value; // DataView 物件
            let hexString = '';
            
            // 解析 Hex 字串
            for (let i = 0; i < value.byteLength; i++) {
                const byte = value.getUint8(i);
                hexString += byte.toString(16).padStart(2, '0').toUpperCase() + ' ';
            }
            
            // --- 1. 取出氣壓並更新文字 ---
            const pressureValue = parsePressureData(value);
            
            // 只有當該封包確實解析出氣壓時，才更新文字和圖表
            if (pressureValue !== null) {
                pressureText.textContent = `壓力 = ${pressureValue.toFixed(2)} hPA`;
                
                // --- 2. 更新即時圖表 ---
                const now = Date.now();
                pressureDataPoints.push({ x: now, y: pressureValue });
                
                // 依據下拉選單過濾過舊的資料 (10s, 20s, 30s, 60s)
                const timeWindow = parseInt(timeRangeSelect.value) * 1000;
                const cutoffTime = now - timeWindow;
                
                while(pressureDataPoints.length > 0 && pressureDataPoints[0].x < cutoffTime) {
                    pressureDataPoints.shift();
                }
                
                // 維持圖表 X 軸為最近的秒數，形成滾動效果
                chartInstance.options.scales.x.min = cutoffTime;
                chartInstance.options.scales.x.max = now;
                chartInstance.update();
            }

            // --- 3. 更新接收 Log 區塊 ---
            // 為了避免 10Hz 導致網頁 DOM 卡頓，簡化這裡的輸出並且只保留 20 行
            const dataRow = document.createElement('div');
            dataRow.className = 'border-b border-slate-200 pb-1 last:border-0';
            dataRow.innerHTML = `<span class="text-xs text-slate-400">Hex:</span> <span class="tracking-wider text-blue-600">${hexString}</span>`;
            rxDataBox.appendChild(dataRow);
            
            while (rxDataBox.children.length > 20) {
                rxDataBox.removeChild(rxDataBox.firstChild);
            }
            rxDataBox.scrollTop = rxDataBox.scrollHeight;
        }

        // 發送 Byte Array 指令的通用函式
        async function sendByteArray(server, uint8Array) {
            try {
                const service = await server.getPrimaryService(SERVICE_UUID);
                const characteristic = await service.getCharacteristic(WRITE_UUID);

                let hexStr = Array.from(uint8Array).map(b => '0x' + b.toString(16).padStart(2, '0').toUpperCase()).join(' ');
                log(`寫入指令: ${hexStr}`, 'info');
                
                await characteristic.writeValue(uint8Array);
            } catch (error) {
                log(`發送指令失敗: ${error.message}`, 'error');
            }
        }

        // --- 綁定關機按鈕 (0x43) ---
        powerOffBtn.addEventListener('click', async () => {
            if (bluetoothDevice && bluetoothDevice.gatt.connected) {
                log('執行關機指令...', 'warning');
                await sendByteArray(bluetoothDevice.gatt, new Uint8Array([0x43]));
            } else {
                log('請先連線裝置！', 'error');
            }
        });

        function onDisconnected() {
            log('裝置已中斷連線。', 'warning');
            updateUI(false);
        }

        disconnectBtn.addEventListener('click', () => {
            if (bluetoothDevice) bluetoothDevice.gatt.disconnect();
        });

        function updateUI(isConnected, name = '') {
            if (isConnected) {
                statusText.textContent = '已連線';
                statusText.className = 'text-xl font-bold text-emerald-600';
                deviceNameContainer.classList.remove('hidden');
                deviceNameEl.textContent = name;
                scanBtn.classList.add('hidden');
                disconnectBtn.classList.remove('hidden');
                powerOffBtn.classList.remove('hidden');
            } else {
                statusText.textContent = '尚未連線';
                statusText.className = 'text-xl font-bold text-slate-700';
                deviceNameContainer.classList.add('hidden');
                scanBtn.classList.remove('hidden');
                disconnectBtn.classList.add('hidden');
                powerOffBtn.classList.add('hidden');
            }
        }

        function log(message, type = 'normal') {
            const p = document.createElement('p');
            p.className = type === 'error' ? 'text-rose-400' : type === 'success' ? 'text-emerald-400' : type === 'warning' ? 'text-yellow-400' : 'text-green-400';
            p.innerHTML = `> ${message}`;
            logBox.appendChild(p);
            logBox.scrollTop = logBox.scrollHeight;
        }
    </script>
</body>
</html>
