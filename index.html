<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧導引式肺適能儀</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

    <!-- 標題區 -->
    <div class="sticky top-0 z-50 bg-slate-50/95 backdrop-blur-sm pt-4 pb-3 border-b border-slate-200 mb-4 shadow-sm">
        <div class="max-w-2xl mx-auto px-4 text-center">
            <h1 class="text-3xl font-extrabold text-blue-700 mb-1 tracking-wider">智慧導引式肺適能儀</h1>
            <p class="text-xs font-light text-blue-500 tracking-widest">Samwell Testing Inc.</p>
        </div>
    </div>

    <div class="max-w-2xl mx-auto px-4 pb-10">
        <div class="bg-white rounded-2xl shadow-xl p-8 border border-slate-100 mb-8">
            
            <!-- 訓練處方設定區 -->
            <div class="mb-6 bg-indigo-50 p-5 rounded-xl border border-indigo-100 shadow-inner">
                <h3 class="text-sm font-bold text-indigo-800 mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    訓練處方設定
                </h3>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-semibold text-indigo-600 mb-1">吸氣秒數 (秒)</label>
                        <input type="number" id="inhaleTime" value="3" class="w-full text-sm p-2 border border-indigo-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-indigo-600 mb-1">低氣壓目標 (hPA)</label>
                        <input type="number" id="targetPressure" value="-10" class="w-full text-sm p-2 border border-indigo-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-indigo-600 mb-1">呼氣秒數 (秒)</label>
                        <input type="number" id="exhaleTime" value="3" class="w-full text-sm p-2 border border-indigo-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                </div>
                <button id="trainingBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition duration-200 shadow-md">
                    開始導引訓練
                </button>
            </div>

            <!-- Firebase 歷史紀錄區塊 -->
            <div class="mb-6 bg-slate-50 p-5 rounded-xl border border-slate-200">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-sm font-bold text-slate-700 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
                        歷史訓練紀錄 (雲端同步)
                    </h3>
                    <span id="syncStatus" class="text-xs text-slate-400">連線檢查中...</span>
                </div>
                <div id="historyList" class="max-h-32 overflow-y-auto space-y-2 text-sm font-mono">
                    <p class="text-slate-400 text-xs italic">尚無訓練紀錄或正在載入中...</p>
                </div>
            </div>

            <!-- 壓力顯示與即時圖表區 -->
            <div class="mb-6 bg-slate-50 p-5 rounded-xl border border-slate-200 relative overflow-hidden">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-4 gap-4 relative z-10">
                    <div class="flex items-baseline gap-2">
                        <h3 class="text-xl font-bold text-slate-700">吸氣強度 =</h3>
                        <div class="text-4xl font-extrabold text-blue-600 tracking-tight transition-all" id="pressureText">--</div>
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-slate-500 mr-2">顯示範圍:</label>
                        <select id="timeRangeSelect" class="text-sm p-1 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="10">10 秒</option>
                            <option value="20">20 秒</option>
                            <option value="30">30 秒</option>
                            <option value="60">60 秒</option>
                        </select>
                    </div>
                </div>
                
                <div class="w-full h-64 relative" id="chartContainer">
                    <canvas id="pressureChart"></canvas>
                    <div id="targetIcon" class="hidden absolute left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold border border-blue-300 shadow-md pointer-events-none transition-all duration-300 z-20 flex items-center gap-1">
                        <span class="animate-pulse">🎯</span> 目標
                    </div>
                </div>
            </div>

            <!-- 狀態與連線控制區 -->
            <div class="flex items-center justify-between mb-6 pb-6 border-b border-slate-100">
                <div>
                    <p class="text-sm font-medium text-slate-500 mb-1">連線狀態</p>
                    <span id="statusText" class="text-lg font-bold text-slate-700">尚未連線</span>
                </div>
                <div id="deviceNameContainer" class="hidden text-right">
                    <p class="text-sm font-medium text-slate-500 mb-1">裝置名稱</p>
                    <p id="deviceName" class="text-md font-semibold text-blue-600">--</p>
                </div>
            </div>

            <div class="flex gap-4 mb-6">
                <button id="scanBtn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl transition">
                    搜尋並連線
                </button>
                <button id="disconnectBtn" class="hidden flex-1 bg-rose-50 text-rose-600 border border-rose-200 font-semibold py-3 px-6 rounded-xl transition">
                    中斷連線
                </button>
                <button id="powerOffBtn" class="hidden flex-1 bg-slate-800 hover:bg-slate-900 text-white font-semibold py-3 px-6 rounded-xl transition shadow-sm">
                    關機 (0x43)
                </button>
            </div>

            <!-- 系統日誌 -->
            <div class="bg-slate-900 rounded-xl p-4">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-mono text-slate-400">系統日誌</span>
                    <button id="clearLogBtn" class="text-xs text-slate-500 hover:text-white transition">清除</button>
                </div>
                <div id="logBox" class="h-32 overflow-y-auto font-mono text-xs text-green-400 space-y-1"></div>
            </div>
        </div>
    </div>

    <!-- 將腳本改為 module 以支援 Firebase SDK 匯入 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // DOM 元素綁定
        const scanBtn = document.getElementById('scanBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const powerOffBtn = document.getElementById('powerOffBtn');
        const trainingBtn = document.getElementById('trainingBtn');
        const statusText = document.getElementById('statusText');
        const deviceNameEl = document.getElementById('deviceName');
        const deviceNameContainer = document.getElementById('deviceNameContainer');
        const logBox = document.getElementById('logBox');
        const pressureText = document.getElementById('pressureText');
        const timeRangeSelect = document.getElementById('timeRangeSelect');
        const targetIcon = document.getElementById('targetIcon');
        const historyList = document.getElementById('historyList');
        const syncStatus = document.getElementById('syncStatus');

        // ==========================================
        // Firebase 雲端資料庫初始化與串接
        // ==========================================
        const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        let db = null;
        let auth = null;
        let currentUser = null;
        let unsubscribeHistory = null;

        try {
            const firebaseConfig = JSON.parse(firebaseConfigStr);
            if (Object.keys(firebaseConfig).length > 0) {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                // 執行登入 (必須先登入才能讀寫資料)
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        log('Firebase 驗證失敗: ' + err.message, 'error');
                        syncStatus.textContent = '雲端驗證失敗';
                    }
                };
                initAuth();

                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    if (user) {
                        syncStatus.textContent = '已連線至雲端 (即時同步)';
                        syncStatus.className = 'text-xs text-emerald-500 font-bold';
                        loadTrainingHistory();
                    }
                });
            } else {
                syncStatus.textContent = '未啟用雲端功能 (Local)';
            }
        } catch (e) {
            console.warn("Firebase 初始化失敗:", e);
            syncStatus.textContent = '雲端載入錯誤';
        }

        function loadTrainingHistory() {
            if (!currentUser || !db) return;
            const recordsRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'training_records');
            
            // 即時監聽資料庫變化
            unsubscribeHistory = onSnapshot(recordsRef, (snapshot) => {
                const records = [];
                snapshot.forEach(doc => {
                    records.push({ id: doc.id, ...doc.data() });
                });
                
                // 依據時間降冪排序 (最新的在最上面)
                records.sort((a, b) => b.timestamp - a.timestamp);
                
                if (records.length === 0) {
                    historyList.innerHTML = '<p class="text-slate-400 text-xs italic">尚未有訓練紀錄，完成一次訓練後將顯示於此。</p>';
                } else {
                    historyList.innerHTML = records.map(record => {
                        const date = new Date(record.timestamp).toLocaleString('zh-TW', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                        return `
                            <div class="flex justify-between items-center bg-white p-2 rounded border border-slate-100 shadow-sm">
                                <div>
                                    <span class="text-xs text-slate-500">${date}</span>
                                    <p class="text-sm text-slate-700 font-bold">完成 <span class="text-indigo-600">${record.completedCycles}</span> 次循環</p>
                                </div>
                                <div class="text-right">
                                    <span class="text-xs text-slate-400">目標: ${record.targetPressure} hPA</span>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            }, (error) => {
                console.error("載入紀錄錯誤:", error);
                log('載入歷史紀錄失敗', 'error');
            });
        }

        async function saveTrainingRecordToCloud(completedCycles, inhaleTime, exhaleTime, targetPressure) {
            if (!currentUser || !db || completedCycles <= 0) return;
            
            try {
                const recordsRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'training_records');
                await addDoc(recordsRef, {
                    timestamp: Date.now(),
                    completedCycles: completedCycles,
                    inhaleTime: inhaleTime,
                    exhaleTime: exhaleTime,
                    targetPressure: targetPressure
                });
                log(`已將本次訓練 (${completedCycles}次) 同步至雲端`, 'success');
            } catch (err) {
                log(`儲存雲端紀錄失敗: ${err.message}`, 'error');
            }
        }

        // ==========================================
        // 藍牙設備通訊與介面邏輯
        // ==========================================
        const SERVICE_UUID = '0000ae30-0000-1000-8000-00805f9b34fb';
        const WRITE_UUID = '0000ae01-0000-1000-8000-00805f9b34fb';
        const NOTIFY_UUID = '0000ae02-0000-1000-8000-00805f9b34fb';
        const synth = window.speechSynthesis;

        let bluetoothDevice = null;
        let chartInstance = null;
        let pressureDataPoints = []; 
        
        // 校正相關變數
        let isCalibrating = false;
        let isReady = false; 
        let calibrationStartTime = 0;
        let calibrationValues = [];
        let basePressure = 0;

        // 訓練處方相關變數
        let isTraining = false;
        let trainingPhase = 'IDLE'; 
        let hasReachedTarget = false;
        let targetLineValue = null;
        let trainingTimeout = null;
        let currentTrainingCycles = 0; // 記錄本次訓練完成的循環數

        function initChart() {
            const ctx = document.getElementById('pressureChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [
                        { label: '氣壓', data: pressureDataPoints, borderColor: '#2563eb', backgroundColor: 'rgba(37, 99, 235, 0.1)', borderWidth: 2, pointRadius: 0, fill: true, tension: 0.1 },
                        { label: '目標線', data: [], borderColor: '#ef4444', borderDash: [5, 5], borderWidth: 2, pointRadius: 0, fill: false }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, animation: false, plugins: { legend: { display: false } }, scales: { x: { type: 'linear', display: false }, y: {} } }
            });
        }
        initChart();

        document.getElementById('clearLogBtn').addEventListener('click', () => { logBox.innerHTML = ''; });

        scanBtn.addEventListener('click', async () => {
            try {
                log(`正在請求裝置...`, 'info');
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'SamwellAP' }],
                    optionalServices: [SERVICE_UUID] 
                });

                bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);
                connectToGattServer();
            } catch (error) {
                log(`錯誤: ${error.message}`, 'error');
            }
        });

        async function connectToGattServer() {
            try {
                statusText.textContent = '連線中...';
                log('連線至 GATT 伺服器...', 'info');
                const server = await bluetoothDevice.gatt.connect();
                
                log('連線成功！', 'success');
                updateUI(true, bluetoothDevice.name);

                await setupNotifications(server);

                const freqConfig = new Uint8Array([0x12, 0x05, 0xFF, 0x00, 0x04, 0x0A, 0x01, 0x03, 0x05, 0x12, 0x00]);
                log('設定回傳頻率為 10Hz...', 'info');
                await sendByteArray(server, freqConfig);

                log('已排程：2 秒後傳送指令 0x29...', 'info');
                setTimeout(async () => {
                    if (bluetoothDevice && bluetoothDevice.gatt.connected) {
                        await sendByteArray(server, new Uint8Array([0x29]));
                    }
                }, 2000);

            } catch (error) {
                log(`連線失敗: ${error.message}`, 'error');
                updateUI(false);
            }
        }

        async function setupNotifications(server) {
            try {
                const service = await server.getPrimaryService(SERVICE_UUID);
                const characteristic = await service.getCharacteristic(NOTIFY_UUID);
                
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', handleCharacteristicValueChanged);
                log('已成功開啟資料接收監聽！', 'success');
            } catch (error) {
                log(`開啟接收通知失敗: ${error.message}`, 'error');
            }
        }

        function parsePressureData(dataView) {
            if (dataView.byteLength < 7 || dataView.getUint8(0) !== 0x11) return null; 

            let ctl = (dataView.getUint8(2) << 8) | dataView.getUint8(1);
            let L = 7;

            if ((ctl & 0x0001) !== 0) L += 6; 
            if ((ctl & 0x0002) !== 0) L += 6; 
            if ((ctl & 0x0004) !== 0) L += 6; 
            if ((ctl & 0x0008) !== 0) L += 6; 

            if ((ctl & 0x0010) !== 0) {
                if (L + 5 > dataView.byteLength) return null;
                L += 2; 

                let b0 = dataView.getUint8(L);
                let b1 = dataView.getUint8(L + 1);
                let b2 = dataView.getUint8(L + 2);
                let tmp32 = (b2 << 16) | (b1 << 8) | b0;
                
                if ((tmp32 & 0x800000) !== 0) tmp32 = tmp32 | 0xff000000;
                return tmp32 * 0.0002384185791;
            }
            return null; 
        }

        function handleCharacteristicValueChanged(event) {
            const value = event.target.value; 
            const rawPressure = parsePressureData(value);
            
            if (rawPressure !== null) {
                const now = Date.now();

                if (!isCalibrating && !isReady) {
                    isCalibrating = true;
                    calibrationStartTime = now;
                    calibrationValues.push(rawPressure);
                    pressureText.textContent = `初始化...`;
                } 
                else if (isCalibrating) {
                    calibrationValues.push(rawPressure);
                    let elapsed = now - calibrationStartTime;
                    let remaining = Math.ceil((5000 - elapsed) / 1000);
                    
                    if (remaining > 0) {
                        pressureText.textContent = `初始化倒數: ${remaining}`;
                    } else {
                        let sum = calibrationValues.reduce((a, b) => a + b, 0);
                        basePressure = sum / calibrationValues.length;
                        isCalibrating = false;
                        isReady = true;
                        log(`校正完成，基準均值: ${basePressure.toFixed(4)} hPA`, 'success');
                    }
                } 
                else if (isReady) {
                    let adjustedPressure = rawPressure - basePressure;
                    pressureText.textContent = `${adjustedPressure.toFixed(2)}`;
                    
                    if (isTraining && trainingPhase === 'INHALE' && !hasReachedTarget) {
                        if (adjustedPressure <= targetLineValue) {
                            hasReachedTarget = true;
                            speak("好棒棒");
                        }
                    }

                    pressureDataPoints.push({ x: now, y: adjustedPressure });
                    const timeWindow = parseInt(timeRangeSelect.value) * 1000;
                    const cutoffTime = now - timeWindow;
                    
                    while(pressureDataPoints.length > 0 && pressureDataPoints[0].x < cutoffTime) {
                        pressureDataPoints.shift();
                    }

                    chartInstance.options.scales.x.min = cutoffTime;
                    chartInstance.options.scales.x.max = now;

                    if (isTraining && targetLineValue !== null) {
                        chartInstance.data.datasets[1].data = [{ x: cutoffTime, y: targetLineValue }, { x: now, y: targetLineValue }];
                        if (trainingPhase === 'INHALE') {
                            const yPixel = chartInstance.scales.y.getPixelForValue(targetLineValue);
                            if (!isNaN(yPixel)) {
                                targetIcon.style.top = `${yPixel}px`;
                                targetIcon.classList.remove('hidden');
                            }
                        } else {
                            targetIcon.classList.add('hidden');
                        }
                    } else {
                        chartInstance.data.datasets[1].data = [];
                        targetIcon.classList.add('hidden');
                    }
                    chartInstance.update();
                }
            }
        }

        function speak(text) {
            if (synth.speaking) synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW'; 
            utterance.rate = 1.1;     
            utterance.pitch = 1.2;    
            synth.speak(utterance);
        }

        async function runTrainingCycle() {
            if (!isTraining) return;

            const inhaleTimeMs = parseFloat(document.getElementById('inhaleTime').value) * 1000;
            const exhaleTimeMs = parseFloat(document.getElementById('exhaleTime').value) * 1000;
            targetLineValue = parseFloat(document.getElementById('targetPressure').value);

            trainingPhase = 'INHALE';
            hasReachedTarget = false;
            speak("吸氣");
            
            const firstWait = Math.max(0, inhaleTimeMs - 500);
            const secondWait = inhaleTimeMs - firstWait;

            await new Promise(r => { trainingTimeout = setTimeout(r, firstWait); });
            if (!isTraining) return; 

            if (!hasReachedTarget) speak("加油");

            if (secondWait > 0) {
                await new Promise(r => { trainingTimeout = setTimeout(r, secondWait); });
            }
            if (!isTraining) return;

            trainingPhase = 'EXHALE';
            targetIcon.classList.add('hidden'); 
            speak("吐氣");

            await new Promise(r => { trainingTimeout = setTimeout(r, exhaleTimeMs); });
            if (!isTraining) return; 

            // 完成一次完整的吸吐循環
            currentTrainingCycles++;

            runTrainingCycle();
        }

        function stopTraining() {
            if (!isTraining) return;
            isTraining = false;
            clearTimeout(trainingTimeout);
            synth.cancel(); 
            
            trainingBtn.textContent = "開始導引訓練";
            trainingBtn.classList.replace('bg-rose-600', 'bg-indigo-600');
            trainingBtn.classList.replace('hover:bg-rose-700', 'hover:bg-indigo-700');
            
            targetLineValue = null;
            targetIcon.classList.add('hidden');
            if (chartInstance) {
                chartInstance.data.datasets[1].data = [];
                chartInstance.update();
            }
            log('已停止導引訓練', 'warning');

            // 訓練結束時儲存紀錄到雲端
            if (currentTrainingCycles > 0) {
                const iTime = document.getElementById('inhaleTime').value;
                const eTime = document.getElementById('exhaleTime').value;
                const targetP = document.getElementById('targetPressure').value;
                saveTrainingRecordToCloud(currentTrainingCycles, parseFloat(iTime), parseFloat(eTime), parseFloat(targetP));
            }
        }

        trainingBtn.addEventListener('click', () => {
            if (!isReady) {
                alert("請先連線裝置，並等待 5 秒氣壓初始化完成後再開始訓練！");
                return;
            }

            if (isTraining) {
                stopTraining();
            } else {
                isTraining = true;
                currentTrainingCycles = 0; // 重置循環計數
                trainingBtn.textContent = "停止導引訓練";
                trainingBtn.classList.replace('bg-indigo-600', 'bg-rose-600');
                trainingBtn.classList.replace('hover:bg-indigo-700', 'hover:bg-rose-700');
                log('啟動導引訓練', 'success');
                
                const unlockAudio = new SpeechSynthesisUtterance('');
                synth.speak(unlockAudio);

                runTrainingCycle();
            }
        });

        async function sendByteArray(server, uint8Array) {
            try {
                const service = await server.getPrimaryService(SERVICE_UUID);
                const characteristic = await service.getCharacteristic(WRITE_UUID);

                let hexStr = Array.from(uint8Array).map(b => '0x' + b.toString(16).padStart(2, '0').toUpperCase()).join(' ');
                log(`寫入指令: ${hexStr}`, 'info');
                
                await characteristic.writeValue(uint8Array);
            } catch (error) {
                log(`發送指令失敗: ${error.message}`, 'error');
            }
        }

        powerOffBtn.addEventListener('click', async () => {
            if (bluetoothDevice && bluetoothDevice.gatt.connected) {
                log('執行關機指令...', 'warning');
                await sendByteArray(bluetoothDevice.gatt, new Uint8Array([0x43]));
            } else {
                log('請先連線裝置！', 'error');
            }
        });

        function onDisconnected() {
            log('裝置已中斷連線。', 'warning');
            isCalibrating = false;
            isReady = false;
            stopTraining(); 
            updateUI(false);
        }

        disconnectBtn.addEventListener('click', () => {
            if (bluetoothDevice) bluetoothDevice.gatt.disconnect();
        });

        function updateUI(isConnected, name = '') {
            if (isConnected) {
                statusText.textContent = '已連線';
                statusText.className = 'text-lg font-bold text-emerald-600';
                deviceNameContainer.classList.remove('hidden');
                deviceNameEl.textContent = name;
                scanBtn.classList.add('hidden');
                disconnectBtn.classList.remove('hidden');
                powerOffBtn.classList.remove('hidden');
            } else {
                statusText.textContent = '尚未連線';
                statusText.className = 'text-lg font-bold text-slate-700';
                deviceNameContainer.classList.add('hidden');
                scanBtn.classList.remove('hidden');
                disconnectBtn.classList.add('hidden');
                powerOffBtn.classList.add('hidden');
                pressureText.textContent = '--';
                targetIcon.classList.add('hidden');
            }
        }

        function log(message, type = 'normal') {
            const p = document.createElement('p');
            p.className = type === 'error' ? 'text-rose-400' : type === 'success' ? 'text-emerald-400' : type === 'warning' ? 'text-yellow-400' : 'text-slate-400';
            p.innerHTML = `> ${message}`;
            logBox.appendChild(p);
            logBox.scrollTop = logBox.scrollHeight;
        }
    </script>
</body>
</html>
